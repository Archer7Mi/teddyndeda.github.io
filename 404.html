<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0a0c10" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .error-page {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        gap: 1rem;
      }
      .error-code {
        font-size: 6rem;
        font-weight: 700;
        color: var(--color-accent);
        letter-spacing: -0.05em;
        line-height: 1;
        opacity: 0.4;
      }
      .error-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--color-text);
      }
      .error-desc {
        color: var(--color-text-muted);
        max-width: 40ch;
      }
      .error-back { margin-top: 0.5rem; }
    </style>
    <title>404 — Page Not Found | Teddy Ndeda</title>
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="nav-container">
        <a class="nav-brand" href="/" aria-label="Teddy Ndeda — home">
          <svg class="brand-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7L12 2z"/></svg>
          Teddy Ndeda
        </a>
      </div>
    </header>
    <main>
      <div class="error-page">
        <p class="error-code">404</p>
        <h1 class="error-title">Page not found</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
        <a class="btn btn-primary error-back" href="/">← Back to Home</a>
      </div>
    </main>
  </body>
</html>
